# Cloud Build pipeline for Tessar.
#
# Builds the Docker image, pushes to Artifact Registry, and deploys to
# Cloud Run with secrets bound from Secret Manager.

substitutions:
  _REGION: asia-south1
  _SERVICE: tessar
  _APP_URL: ""
  _VERTEX_LOCATION: us-central1
  _VERTEX_MODEL: gemini-2.5-pro

steps:
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - --tag=asia-south1-docker.pkg.dev/$PROJECT_ID/tessar/tessar:$BUILD_ID
      - --tag=asia-south1-docker.pkg.dev/$PROJECT_ID/tessar/tessar:latest
      - .

  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - --all-tags
      - asia-south1-docker.pkg.dev/$PROJECT_ID/tessar/tessar

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=asia-south1-docker.pkg.dev/$PROJECT_ID/tessar/tessar:$BUILD_ID
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --cpu=2
      - --memory=2Gi
      - --min-instances=1
      - --max-instances=20
      - --concurrency=20
      - --timeout=900
      - --port=8080
      - --service-account=tessar-runtime@$PROJECT_ID.iam.gserviceaccount.com
      - --set-env-vars=GCP_PROJECT_ID=$PROJECT_ID,GCP_LOCATION=${_VERTEX_LOCATION},VERTEX_MODEL=${_VERTEX_MODEL},NEXT_PUBLIC_APP_URL=${_APP_URL},FIREBASE_ADMIN_PROJECT_ID=$PROJECT_ID
      - --set-secrets=NEXT_PUBLIC_FIREBASE_API_KEY=tessar-fb-api-key:latest,NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=tessar-fb-auth-domain:latest,NEXT_PUBLIC_FIREBASE_PROJECT_ID=tessar-fb-project:latest,NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=tessar-fb-bucket:latest,NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=tessar-fb-sender:latest,NEXT_PUBLIC_FIREBASE_APP_ID=tessar-fb-app-id:latest,RAZORPAY_KEY_ID=tessar-rzp-key-id:latest,RAZORPAY_KEY_SECRET=tessar-rzp-key-secret:latest,RAZORPAY_WEBHOOK_SECRET=tessar-rzp-webhook-secret:latest,NEXT_PUBLIC_RAZORPAY_KEY_ID=tessar-rzp-key-id:latest,RESEND_API_KEY=tessar-resend-key:latest,RESEND_FROM_EMAIL=tessar-resend-from:latest,ADMIN_EMAILS=tessar-admin-emails:latest

images:
  - asia-south1-docker.pkg.dev/$PROJECT_ID/tessar/tessar:$BUILD_ID
  - asia-south1-docker.pkg.dev/$PROJECT_ID/tessar/tessar:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
